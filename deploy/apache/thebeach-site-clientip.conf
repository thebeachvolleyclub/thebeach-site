# Versioned trust boundary for the anonymous season-signup throttle.
# (Overseer audit thebeach-app-v2-dd5bcd49, finding 8.)
#
# The site's /api/signup/submit route keys abuse control on the client's
# NETWORK IP. It reads ONLY the dedicated internal header `X-TB-Client-IP`
# (src/lib/trustedClientIp.core.ts INTERNAL_CLIENT_IP_HEADER) — never a
# caller-supplied X-Real-IP / X-Forwarded-For. This snippet makes that header
# authoritative: it STRIPS any inbound copy a client may have sent, then SETS
# it from the connection's real peer address, so it cannot be spoofed.
#
# Install: Include this from each site vhost that proxies to the Next.js
# container (prod: api-facing vhost for www.thebeach.one; staging equivalent),
# INSIDE the <VirtualHost> that terminates the client connection, BEFORE the
# ProxyPass to the container. Requires mod_headers and (if there is an upstream
# CDN/load balancer) mod_remoteip.
#
#   a2enmod headers remoteip && systemctl reload apache2
#
# THEN, and only then, set TRUST_PROXY_CLIENT_IP=1 in the site's .env. The app
# is DEFAULT-CLOSED: without that flag it reads NO forwarded IP header, so if
# this snippet is ever missing a client-injected X-TB-Client-IP is ignored
# rather than trusted. Install this file and set the flag together, as one step.
#
# Verify after deploy (a client-supplied header MUST be ignored):
#   curl -s https://www.thebeach.one/api/signup/config -H 'X-TB-Client-IP: 1.2.3.4'
#   # → server behaves as if the header were the real peer, never 1.2.3.4.

# 1) If a trusted CDN / load balancer sits in front of Apache, correct the peer
#    address from its X-Forwarded-For BEFORE we stamp our header. List ONLY the
#    trusted proxy source ranges here; without an upstream proxy, omit this
#    block and %{REMOTE_ADDR}s is already the real client.
# <IfModule mod_remoteip.c>
#   RemoteIPHeader X-Forwarded-For
#   RemoteIPTrustedProxy 127.0.0.1
#   # RemoteIPTrustedProxy <cdn-range/mask>
# </IfModule>

<IfModule mod_headers.c>
  # 2) Defence: never trust an inbound copy of the internal header. `early`
  #    runs before the proxy stage so the client value cannot survive.
  RequestHeader unset X-TB-Client-IP early

  # 3) Stamp the authoritative value from the (mod_remoteip-corrected) peer.
  RequestHeader set X-TB-Client-IP "expr=%{REMOTE_ADDR}"
</IfModule>
